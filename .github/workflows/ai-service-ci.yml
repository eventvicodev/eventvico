name: FastAPI AI Service CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'eventvico-ai/**'
      - '.github/workflows/ai-service-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'eventvico-ai/**'
      - '.github/workflows/ai-service-ci.yml'

concurrency:
  group: fastapi-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: eventvico-ai

jobs:
  test:
    name: Test FastAPI Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: eventvico-ai/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install pytest httpx

      - name: Run tests
        run: pytest tests/ -v

  build-and-deploy:
    name: Build & Deploy to Akamai
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: eventvico-ai
          push: false  # TODO: configure Akamai Container Registry credentials
          tags: eventvico-ai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # TODO: Add Akamai deployment step when credentials are configured
      # - name: Deploy to Akamai Cloud
      #   run: ...
